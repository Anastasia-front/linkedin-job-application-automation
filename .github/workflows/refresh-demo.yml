name: Refresh n8n Demo

on:
  schedule:
    # 0 2 * * * = 02:00 UTC every day (GitHub cron schedules always run in UTC).
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      n8n_image:
        description: "Pinned n8n image to deploy to demo"
        required: true
        default: "docker.n8n.io/n8nio/n8n:1.102.4"

concurrency:
  group: n8n-demo-refresh
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  INSTANCE_ID: ${{ vars.N8N_INSTANCE_ID }}
  DEMO_INSTANCE_ID: ${{ vars.N8N_DEMO_INSTANCE_ID }}
  PROD_DOMAIN: ${{ vars.N8N_PROD_DOMAIN }}
  DEMO_DOMAIN: ${{ vars.N8N_DEMO_DOMAIN }}
  # scheduled runs have no workflow_dispatch inputs, so fall back to the pinned default.
  N8N_IMAGE: ${{ github.event.inputs.n8n_image || 'docker.n8n.io/n8nio/n8n:1.102.4' }}

jobs:
  # ---------------------------------------------------------------------
  # 1. Validate. Static checks only, no AWS calls.
  # ---------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          set -Eeuo pipefail
          test -n "$AWS_REGION"
          test -n "$INSTANCE_ID"
          test -n "$DEMO_INSTANCE_ID"
          test -n "$N8N_IMAGE"
          test -n "${{ secrets.AWS_ACCESS_KEY_ID }}"
          test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Validate shell scripts
        run: |
          set -Eeuo pipefail
          for f in deploy/scripts/*.sh scripts/n8n/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck deploy/scripts/*.sh scripts/n8n/*.sh
          fi

      - name: Validate production compose file
        run: |
          set -Eeuo pipefail
          cp .env.example .env
          docker compose config >/dev/null
          rm -f .env

      - name: Validate demo compose file
        run: |
          set -Eeuo pipefail
          cp .env.demo.example .env.demo
          docker compose -f docker-compose.demo.yml --env-file .env.demo config >/dev/null
          rm -f .env.demo

      - name: Run sanitizer/validator unit tests
        run: |
          set -Eeuo pipefail
          pip install --quiet pytest
          python3 -m pytest tests/n8n -q

      - name: Validate the production workflow manifest
        run: |
          set -Eeuo pipefail
          python3 scripts/n8n/validate_workflow_manifest.py \
            --manifest workflows/manifest.json --workflow-dir workflows

  # ---------------------------------------------------------------------
  # 2. Verify production is healthy before exporting workflows from it.
  # ---------------------------------------------------------------------
  verify-production-source:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify production health
        run: |
          set -Eeuo pipefail
          chmod +x deploy/scripts/ssm-run.sh
          cat > /tmp/verify-prod.sh <<'REMOTE'
          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:5678/health
          echo
          curl -k --fail --silent --show-error --max-time 10 --resolve "${PROD_DOMAIN}:443:127.0.0.1" "https://${PROD_DOMAIN}/health"
          REMOTE
          cat > /tmp/verify-prod-env.txt <<EOF
          PROD_DOMAIN="${PROD_DOMAIN}"
          EOF
          deploy/scripts/ssm-run.sh "$AWS_REGION" "$INSTANCE_ID" /tmp/verify-prod.sh /tmp/verify-prod-stdout.txt /tmp/verify-prod-env.txt
          cat /tmp/verify-prod-stdout.txt

  # ---------------------------------------------------------------------
  # 3. Export production workflows (CLI only, no credentials/DB), sanitize,
  #    and validate — all in ONE job so the raw production export never
  #    leaves this job's runner workspace or crosses an artifact boundary.
  #    Only the already-sanitized, already-validated output is uploaded as a
  #    short-retention (1 day) artifact for the deploy-demo job.
  # ---------------------------------------------------------------------
  sanitize-and-validate-workflows:
    needs: verify-production-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Export workflows from production (CLI export only, no credentials/DB)
        run: |
          set -Eeuo pipefail
          chmod +x deploy/scripts/ssm-run.sh
          cat > /tmp/export.sh <<'REMOTE'
          CONTAINER=linkedin-job-application-automation-n8n
          EXPORT_DIR=/home/node/.n8n-files/ci-export
          docker exec "$CONTAINER" rm -rf "$EXPORT_DIR"
          docker exec "$CONTAINER" mkdir -p "$EXPORT_DIR"
          docker exec "$CONTAINER" n8n export:workflow --help > /tmp/export-help.txt 2>&1 || true
          if ! grep -q -- '--separate' /tmp/export-help.txt || ! grep -q -- '--output' /tmp/export-help.txt; then
            echo "n8n export:workflow --help does not advertise --separate/--output on this pinned image" >&2
            exit 1
          fi
          docker exec "$CONTAINER" n8n export:workflow --all --separate --output="$EXPORT_DIR"
          docker exec "$CONTAINER" tar -C "$EXPORT_DIR" -cf - . | base64 -w 0
          docker exec "$CONTAINER" rm -rf "$EXPORT_DIR"
          REMOTE
          deploy/scripts/ssm-run.sh "$AWS_REGION" "$INSTANCE_ID" /tmp/export.sh /tmp/export-blob-b64.txt
          mkdir -p /tmp/raw-export
          base64 -d /tmp/export-blob-b64.txt | tar -x -C /tmp/raw-export
          rm -f /tmp/export-blob-b64.txt /tmp/export.sh
          echo "Exported $(find /tmp/raw-export -name '*.json' | wc -l) workflow file(s) (contents not printed)."

      - name: Sanitize exported workflows
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/sanitized
          python3 scripts/n8n/sanitize_workflows.py \
            --input /tmp/raw-export \
            --output /tmp/sanitized \
            --config config/n8n-demo-sanitization.json \
            --summary-out /tmp/sanitize-summary.json
          cat /tmp/sanitize-summary.json

      - name: Validate sanitized workflows (independent second gate)
        run: |
          set -Eeuo pipefail
          python3 scripts/n8n/validate_demo_workflows.py \
            --input /tmp/sanitized \
            --config config/n8n-demo-sanitization.json \
            --report-out /tmp/validate-report.json
          cat /tmp/validate-report.json

      - name: Package sanitized workflows for the demo deploy job
        run: |
          set -Eeuo pipefail
          tar -C /tmp/sanitized -cf /tmp/sanitized-workflows.tar .

      - uses: actions/upload-artifact@v4
        with:
          name: sanitized-workflows
          path: /tmp/sanitized-workflows.tar
          retention-days: 1

      - name: Shred transient raw export from the runner
        if: always()
        run: rm -rf /tmp/raw-export /tmp/sanitized /tmp/sanitized-workflows.tar

  # ---------------------------------------------------------------------
  # 4. Deploy the demo stack (infra/nginx/compose + sanitized workflows).
  # ---------------------------------------------------------------------
  deploy-demo:
    needs: sanitize-and-validate-workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: sanitized-workflows
          path: /tmp/artifact

      - name: Deploy demo stack via SSM
        run: |
          set -Eeuo pipefail
          test -n "$DEMO_INSTANCE_ID"
          chmod +x deploy/scripts/ssm-run.sh

          NGINX_CONF_BASE64="$(base64 -w0 deploy/nginx/n8n-demo.conf)"
          COMPOSE_FILE_BASE64="$(base64 -w0 docker-compose.demo.yml)"
          BUILD_SEED_SCRIPT_BASE64="$(base64 -w0 scripts/n8n/build_demo_seed.sh)"
          SEED_WORKFLOWS_SCRIPT_BASE64="$(base64 -w0 deploy/scripts/seed-n8n-workflows.sh)"
          RESET_SCRIPT_BASE64="$(base64 -w0 scripts/n8n/reset_demo.sh)"
          WORKFLOWS_TAR_BASE64="$(base64 -w0 /tmp/artifact/sanitized-workflows.tar)"
          DEPLOY_SCRIPT_BASE64="$(base64 -w0 deploy/scripts/deploy-n8n-demo.sh)"

          cat > /tmp/demo-remote.sh <<'REMOTE'
          mkdir -p /home/ubuntu/linkedin-job-application-automation-demo-deploy
          echo "$DEPLOY_SCRIPT_BASE64" | base64 -d > /home/ubuntu/linkedin-job-application-automation-demo-deploy/deploy-n8n-demo.sh
          chmod 0700 /home/ubuntu/linkedin-job-application-automation-demo-deploy/deploy-n8n-demo.sh
          /home/ubuntu/linkedin-job-application-automation-demo-deploy/deploy-n8n-demo.sh
          REMOTE

          cat > /tmp/demo-env.txt <<EOF
          AWS_REGION="${AWS_REGION}"
          N8N_IMAGE="${N8N_IMAGE}"
          NGINX_CONF_BASE64="${NGINX_CONF_BASE64}"
          COMPOSE_FILE_BASE64="${COMPOSE_FILE_BASE64}"
          BUILD_SEED_SCRIPT_BASE64="${BUILD_SEED_SCRIPT_BASE64}"
          SEED_WORKFLOWS_SCRIPT_BASE64="${SEED_WORKFLOWS_SCRIPT_BASE64}"
          RESET_SCRIPT_BASE64="${RESET_SCRIPT_BASE64}"
          WORKFLOWS_TAR_BASE64="${WORKFLOWS_TAR_BASE64}"
          DEPLOY_SCRIPT_BASE64="${DEPLOY_SCRIPT_BASE64}"
          EOF

          deploy/scripts/ssm-run.sh "$AWS_REGION" "$DEMO_INSTANCE_ID" /tmp/demo-remote.sh /tmp/demo-stdout.txt /tmp/demo-env.txt
          cat /tmp/demo-stdout.txt
          rm -f /tmp/demo-remote.sh /tmp/demo-env.txt /tmp/demo-stdout.txt /tmp/artifact/sanitized-workflows.tar

  # ---------------------------------------------------------------------
  # 5. Build the clean demo seed and immediately reset from it, proving the
  #    restore path works before recruiters ever see the instance.
  # ---------------------------------------------------------------------
  build-demo-seed:
    needs: deploy-demo
    runs-on: ubuntu-latest
    outputs:
      seeded_count: ${{ steps.build-seed.outputs.seeded_count }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build demo seed and run an immediate reset
        id: build-seed
        run: |
          set -Eeuo pipefail
          chmod +x deploy/scripts/ssm-run.sh
          cat > /tmp/build-seed.sh <<'REMOTE'
          /opt/n8n-demo/scripts/build_demo_seed.sh
          /usr/local/sbin/reset-n8n-demo.sh
          tail -n 40 /var/log/n8n-demo-reset.log
          cat /opt/n8n-demo/seed/metadata.json
          REMOTE
          cat > /tmp/build-seed-env.txt <<EOF
          GIT_COMMIT="${GITHUB_SHA}"
          N8N_IMAGE_TAG="${N8N_IMAGE}"
          EOF
          deploy/scripts/ssm-run.sh "$AWS_REGION" "$DEMO_INSTANCE_ID" /tmp/build-seed.sh /tmp/build-seed-stdout.txt /tmp/build-seed-env.txt
          cat /tmp/build-seed-stdout.txt

          # metadata.json (printed by the REMOTE script above) carries
          # workflow_count; fall back to "unknown" rather than failing the
          # job on a parsing hiccup — this is a summary field, not a gate.
          seeded_count="$(grep -o '"workflow_count": *[0-9]*' /tmp/build-seed-stdout.txt | tail -1 | grep -o '[0-9]*$' || true)"
          echo "seeded_count=${seeded_count:-unknown}" >> "$GITHUB_OUTPUT"

          rm -f /tmp/build-seed.sh /tmp/build-seed-env.txt /tmp/build-seed-stdout.txt

  # ---------------------------------------------------------------------
  # 6. Verify demo externally (public hostname, no Cloudflare Access in front
  #    of it).
  # ---------------------------------------------------------------------
  verify-demo:
    needs: build-demo-seed
    runs-on: ubuntu-latest
    steps:
      # This is the actual pass/fail gate for demo verification: no `|| true`
      # here. A Cloudflare 521 ("web server is down") or any other failure
      # from these two checks fails the job and blocks the summary from
      # reporting success.
      - name: Verify demo health and info endpoint
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --max-time 15 "https://${DEMO_DOMAIN}/health"
          echo
          curl --fail --silent --show-error --max-time 15 "https://${DEMO_DOMAIN}/demo-info"

      # Diagnostics only (not a gate — runs whether the check above passed or
      # failed, via SSM Run Command, never SSH/port 22). Individual commands
      # tolerate failure with `|| true` because they exist to explain *why*
      # the gate above failed (e.g. a Cloudflare 521 usually means nginx is
      # down, not listening on 443, or the n8n container/health check is
      # unhealthy on the demo host) — the gate itself already recorded
      # success/failure before this step runs.
      - uses: aws-actions/configure-aws-credentials@v4
        if: always()
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Remote diagnostics (via SSM, no SSH)
        if: always()
        run: |
          set -Eeuo pipefail
          chmod +x deploy/scripts/ssm-run.sh
          cat > /tmp/diag-demo.sh <<'REMOTE'
          echo "--- docker ps -a ---"
          docker ps -a || true
          echo "--- n8n container logs (tail 200) ---"
          docker logs "$(docker compose -p n8n-demo --env-file /opt/n8n-demo/.env.demo -f /opt/n8n-demo/docker-compose.yml ps -q n8n 2>/dev/null)" --tail=200 2>&1 || true
          echo "--- listening sockets ---"
          ss -lntp || true
          echo "--- nginx -t ---"
          nginx -t || true
          echo "--- systemctl status nginx ---"
          systemctl status nginx --no-pager || true
          echo "--- local n8n health ---"
          curl -fsS --max-time 10 http://127.0.0.1:5678/health || echo "local n8n health check failed"
          echo "--- local nginx TLS response ---"
          curl -fkSs --max-time 10 https://127.0.0.1/ || echo "local nginx TLS check failed"
          REMOTE
          deploy/scripts/ssm-run.sh "$AWS_REGION" "$DEMO_INSTANCE_ID" /tmp/diag-demo.sh /tmp/diag-demo-stdout.txt || true
          cat /tmp/diag-demo-stdout.txt || true
          rm -f /tmp/diag-demo.sh /tmp/diag-demo-stdout.txt

  # ---------------------------------------------------------------------
  # 7. Verify production is still healthy after the demo refresh. Only runs
  #    when the initial production-source verification succeeded.
  # ---------------------------------------------------------------------
  verify-production-final:
    needs: [verify-production-source, build-demo-seed]
    if: ${{ always() && needs.verify-production-source.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Re-verify production health after the demo pipeline ran
        run: |
          set -Eeuo pipefail
          chmod +x deploy/scripts/ssm-run.sh
          cat > /tmp/verify-prod-final.sh <<'REMOTE'
          curl --fail --silent --show-error --max-time 10 http://127.0.0.1:5678/health
          REMOTE
          deploy/scripts/ssm-run.sh "$AWS_REGION" "$INSTANCE_ID" /tmp/verify-prod-final.sh /tmp/verify-prod-final-stdout.txt
          cat /tmp/verify-prod-final-stdout.txt

  # ---------------------------------------------------------------------
  # 8. Refresh summary.
  # ---------------------------------------------------------------------
  refresh-summary:
    needs:
      - verify-production-source
      - sanitize-and-validate-workflows
      - deploy-demo
      - build-demo-seed
      - verify-demo
      - verify-production-final
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Refresh summary
        run: |
          overall="success"
          for result in \
            "${{ needs.verify-production-source.result }}" \
            "${{ needs.sanitize-and-validate-workflows.result }}" \
            "${{ needs.deploy-demo.result }}" \
            "${{ needs.build-demo-seed.result }}" \
            "${{ needs.verify-demo.result }}" \
            "${{ needs.verify-production-final.result }}"; do
            if [ "$result" != "success" ]; then
              overall="failed"
            fi
          done

          {
            echo "## Demo refresh summary"
            echo "- Overall result: ${overall}"
            echo "- Demo image: ${N8N_IMAGE}"
            echo "- Production source host: ${PROD_DOMAIN}"
            echo "- Demo host: ${DEMO_DOMAIN}"
            echo "- Commit SHA: ${GITHUB_SHA}"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Production source health (pre-refresh): ${{ needs.verify-production-source.result }}"
            echo "- Export/sanitize/validate: ${{ needs.sanitize-and-validate-workflows.result }}"
            echo "- Demo deployment: ${{ needs.deploy-demo.result }}"
            echo "- Demo workflow seed: ${{ needs.build-demo-seed.result }}"
            echo "- Demo workflow seed count: ${{ needs.build-demo-seed.outputs.seeded_count }}"
            echo "- Demo verification: ${{ needs.verify-demo.result }}"
            echo "- Production final verification: ${{ needs.verify-production-final.result }}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$overall" != "success" ]; then
            echo "One or more demo refresh stages did not succeed; see fields above." >&2
            exit 1
          fi
