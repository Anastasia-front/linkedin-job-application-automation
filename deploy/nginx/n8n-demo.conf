# Public demo n8n site. Runs on the dedicated demo EC2 host (never on the
# production host). Proxies only to 127.0.0.1:5678 (the demo Compose
# project's n8n container) and never to the production instance.

limit_req_zone $binary_remote_addr zone=n8n_demo_per_ip:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=n8n_demo_conn_per_ip:10m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    server_name _;

    ssl_certificate /etc/nginx/ssl/demo-n8n.ai-automation-platform.com/origin_certificate.pem;
    ssl_certificate_key /etc/nginx/ssl/demo-n8n.ai-automation-platform.com/origin_private_key.pem;

    return 444;
}

server {
    listen 80;
    listen [::]:80;

    server_name demo-n8n.ai-automation-platform.com;

    return 301 https://demo-n8n.ai-automation-platform.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name demo-n8n.ai-automation-platform.com;

    ssl_certificate /etc/nginx/ssl/demo-n8n.ai-automation-platform.com/origin_certificate.pem;
    ssl_certificate_key /etc/nginx/ssl/demo-n8n.ai-automation-platform.com/origin_private_key.pem;

    # Smaller than production: this instance never needs large binary-data
    # uploads for a portfolio demo.
    client_max_body_size 25m;

    access_log /var/log/nginx/n8n-demo-access.log;
    error_log /var/log/nginx/n8n-demo-error.log;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Static informational banner. Served entirely by Nginx, no n8n involved.
    location = /demo-info {
        default_type text/plain;
        return 200 "This is a public editable demo.\nChanges are reset daily at 04:00 Europe/Paris.\nNo production credentials are stored here.\n";
    }

    # Excluded from rate limiting so reset-script and CI health checks are reliable.
    location = /health {
        proxy_pass http://127.0.0.1:5678/health;
        proxy_set_header Host $host;
    }

    location / {
        limit_req zone=n8n_demo_per_ip burst=15 nodelay;
        limit_conn n8n_demo_conn_per_ip 20;

        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
