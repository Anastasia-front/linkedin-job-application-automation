server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    server_name _;

    ssl_certificate /etc/nginx/ssl/n8n.ai-automation-platform.com/origin_certificate.pem;
    ssl_certificate_key /etc/nginx/ssl/n8n.ai-automation-platform.com/origin_private_key.pem;

    return 444;
}

server {
    listen 80;
    listen [::]:80;

    server_name n8n.ai-automation-platform.com;

    return 301 https://n8n.ai-automation-platform.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name n8n.ai-automation-platform.com;

    ssl_certificate /etc/nginx/ssl/n8n.ai-automation-platform.com/origin_certificate.pem;
    ssl_certificate_key /etc/nginx/ssl/n8n.ai-automation-platform.com/origin_private_key.pem;

    client_max_body_size 100m;

    location / {
        proxy_pass http://127.0.0.1:5678;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
