services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.102.4
    container_name: linkedin-job-application-automation-n8n
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_files:/home/node/.n8n-files
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:5678/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  n8n_data:
    name: linkedin-job-application-automation-n8n-data
  n8n_files:
    name: linkedin-job-application-automation-n8n-files
